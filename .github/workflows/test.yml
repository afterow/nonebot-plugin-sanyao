name: "Test Single Plugin with Key"

on:
  workflow_dispatch:

concurrency:
  group: "single-plugin-test"
  cancel-in-progress: false

jobs:
  test_plugin:
    runs-on: ubuntu-latest
    name: Test nonebot-plugin-sanyao
    steps:
      - name: Checkout noneflow
        uses: actions/checkout@v4
        with:
          repository: nonebot/noneflow
          fetch-depth: 0

      - name: Checkout latest noneflow version
        run: git checkout `git describe --abbrev=0 --tags`

      - name: Install the latest version of uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      # 修改：使用单引号包裹 --key 参数值
      - name: Test plugin using --key
        run: |
          uv run --no-dev -m src.providers.store_test plugin-test \
            --key 'pypi://nonebot-plugin-sanyao' \
            --force
