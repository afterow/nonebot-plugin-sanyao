name: "Test Single Plugin"

on:
  workflow_dispatch:
    inputs:
      plugin_url:
        description: "Plugin GitHub URL"
        required: true
        default: "https://github.com/afterow/nonebot-plugin-sanyao"
      plugin_name:
        description: "Plugin name (optional, auto-detect if empty)"
        required: false
        default: ""

concurrency:
  group: "single-plugin-test"
  cancel-in-progress: false

jobs:
  test_plugin:
    runs-on: ubuntu-latest
    name: Test NoneBot2 Plugin
    steps:
      - name: Checkout noneflow
        uses: actions/checkout@v4
        with:
          repository: nonebot/noneflow
          fetch-depth: 0

      - name: Checkout latest noneflow version
        run: git checkout `git describe --abbrev=0 --tags`

      - name: Install the latest version of uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Extract plugin name from URL
        id: extract
        run: |
          if [ -n "${{ github.event.inputs.plugin_name }}" ]; then
            echo "PLUGIN_NAME=${{ github.event.inputs.plugin_name }}" >> $GITHUB_OUTPUT
          else
            # 从 URL 提取仓库名作为插件名
            PLUGIN_NAME=$(echo "${{ github.event.inputs.plugin_url }}" | sed 's|.*/||' | sed 's|\.git$||')
            echo "PLUGIN_NAME=$PLUGIN_NAME" >> $GITHUB_OUTPUT
          fi

      - name: Test plugin
        run: |
          uv run --no-dev -m src.providers.store_test plugin-test \
            --plugin ${{ steps.extract.outputs.PLUGIN_NAME }} \
            --offset 0 \
            --limit 1 \
            ${{ github.event.inputs.args }}

      - name: Upload test results
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ steps.extract.outputs.PLUGIN_NAME }}
          path: |
            ${{ github.workspace }}/plugin_test/results.json
            ${{ github.workspace }}/plugin_test/plugins.json
            ${{ github.workspace }}/plugin_test/plugin_configs.json
