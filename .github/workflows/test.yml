name: "Test Single Plugin (Hardcoded)"

on:
  workflow_dispatch:

concurrency:
  group: "single-plugin-test"
  cancel-in-progress: false

jobs:
  test_plugin:
    runs-on: ubuntu-latest
    name: Test nonebot-plugin-sanyao
    steps:
      - name: Checkout noneflow
        uses: actions/checkout@v4
        with:
          repository: nonebot/noneflow
          fetch-depth: 0

      - name: Checkout latest noneflow version
        run: git checkout `git describe --abbrev=0 --tags`

      - name: Install the latest version of uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Test plugin
        run: |
          uv run --no-dev -m src.providers.store_test plugin-test \
            --offset 0 \
            --limit 1 \
            nonebot-plugin-sanyao

      - name: Upload test results
        uses: actions/upload-artifact@v4
        with:
          name: test-results-nonebot-plugin-sanyao
          path: |
            ${{ github.workspace }}/plugin_test/results.json
            ${{ github.workspace }}/plugin_test/plugins.json
            ${{ github.workspace }}/plugin_test/plugin_configs.json
